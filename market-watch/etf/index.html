const DATA = JSON.parse(document.getElementById('payload').textContent);
const fmtDate = s => `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6)}`;
const signed = v => v === null || Number.isNaN(v) ? 'N/A' : `${v > 0 ? '+' : ''}${Number(v).toFixed(2)}%`;
const cls = v => v === null ? 'muted' : v > 0 ? 'danger' : v < 0 ? 'success' : 'neutral';
let activeKey = DATA.tabs[0].key;
document.getElementById('asOfLabel').textContent = fmtDate(DATA.asOf);
document.getElementById('universeDateLabel').textContent = fmtDate(DATA.universeDate);
function syncStickyOffsets(){
  const toolbar = document.querySelector('.toolbar');
  document.documentElement.style.setProperty('--toolbar-height', `${Math.ceil(toolbar.getBoundingClientRect().height)}px`);
}
function esc(value){
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function renderTabs(){
  tabs.innerHTML = DATA.tabs.map(t => `<button class="${t.key===activeKey?'active':''}" data-key="${t.key}">${t.label}</button>`).join('');
  tabs.querySelectorAll('button').forEach(b => b.onclick = () => { activeKey = b.dataset.key; renderTabs(); renderScreen(); });
}
function catalystHTML(row){
  const text = esc(row.catalyst);
  if (!row.sourceUrl) return text;
  return `${text}<a class="catalyst-source" href="${esc(row.sourceUrl)}" target="_blank" rel="noopener noreferrer" title="${esc(row.sourceTitle || '查看来源')}">来源</a>`;
}
function heatCard(row){
  const up = row.up || 0;
  const down = row.down || 0;
  const total = Math.max(row.total || 0, 1);
  const upWidth = Math.max(2, up / total * 100);
  const downWidth = Math.max(2, down / total * 100);
  return `<div class="heat-card">
    <h3>${esc(row.category)}</h3>
    <strong class="${cls(row.averageReturn)}">${signed(row.averageReturn)}</strong>
    <div class="heat-bar"><i style="width:${upWidth}%"></i><i style="width:${downWidth}%"></i></div>
    <p><span>${up}</span> / <span>${down}</span> <span>(${row.total}只)</span></p>
  </div>`;
}
function reportHTML(t){

  return `<article class="report" data-tab="${t.key}">
    <header class="report-header"><div><p class="eyebrow">FQUANTSTUDIO MARKET WATCH · ETF</p><h1>FQuantStudio市场观察系列-ETF</h1></div><div class="header-meta"><strong>${fmtDate(DATA.asOf)}</strong><br>${t.label} / ETF Note<br>Source-Verified · Tushare</div></header>
    <section class="lead"><p class="topic">${t.label} · ${t.note}</p><h2>ETF 市场结构、分类热度与资金交易线索同步观察。</h2><p>统计区间：${fmtDate(t.startDate)} - ${fmtDate(t.endDate)}；收益基准日：${fmtDate(t.baseDate)}。ETF/LOF/REIT 收益统一采用前复权口径，分类口径使用 ${fmtDate(DATA.universeDate)} 最新 universe。</p></section>
    <div class="section-title"><h2>主要指数表现</h2><span>展示区间涨跌、日内/隔夜拆分与年初至今表现</span></div>
    <div class="market-table">
      <div class="table-row table-head"><span>指标</span>${cols}</div>
      <div class="table-row table-main"><strong>区间涨跌</strong>${t.marketPerformance.map(r=>`<b class="${cls(r.returnPct)}">${signed(r.returnPct)}</b>`).join('')}</div>
      <div class="table-row"><strong><span class="split-pill">拆分</span>日内</strong>${t.marketPerformance.map(r=>`<b class="${cls(r.intradayPct)}">${signed(r.intradayPct)}</b>`).join('')}</div>
      <div class="table-row"><strong><span class="split-pill">拆分</span>隔夜</strong>${t.marketPerformance.map(r=>`<b class="${cls(r.overnightPct)}">${signed(r.overnightPct)}</b>`).join('')}</div>
      <div class="table-row"><strong>今年以来</strong>${t.marketPerformance.map(r=>`<b class="${cls(r.ytdPct)}">${signed(r.ytdPct)}</b>`).join('')}</div>
    </div>
    <div class="section-title"><h2>分类热力</h2><span>按最新 broad 分类统计区间涨跌数量和平均涨跌幅</span></div>
    <section class="heat-grid">${t.categoryHeat.map(heatCard).join('')}</section>
    <div class="section-title"><h2>区间涨跌幅榜单</h2><span>使用 univ_etf_main，剔除场内货币基金</span></div>
    <div class="movers-grid">${moverPanel('涨幅 Top5', t.etfMovers.top)}${moverPanel('跌幅 Top5', t.etfMovers.bottom)}</div>
    <section class="stat-band"><div class="metric"><span>上涨ETF数</span><strong class="danger">${t.marketStats.up.toLocaleString()}</strong></div><div class="metric"><span>平盘ETF数</span><strong class="neutral">${t.marketStats.flat.toLocaleString()}</strong></div><div class="metric"><span>下跌ETF数</span><strong class="success">${t.marketStats.down.toLocaleString()}</strong></div><div class="metric"><span>有效样本</span><strong class="navy">${t.marketStats.etfCount.toLocaleString()}</strong></div><div class="metric"><span>区间均值/中位数</span><strong class="${cls(t.marketStats.averageReturn)}">${signed(t.marketStats.averageReturn)} / ${signed(t.marketStats.medianReturn)}</strong></div><div class="metric"><span>日内/隔夜中位</span><strong class="navy">${signed(t.marketStats.medianIntraday)} / ${signed(t.marketStats.medianOvernight)}</strong></div></section>
    <footer class="report-footer"><div class="qr-block"><img src="${QR_DATA_URI}"><div><strong>FQuantStudio 市场观察</strong><span>ETF/LOF/REIT 本地 Tushare 数据</span></div></div></footer>
    ${DATA.warnings.length?`<p class="warnings">提示：${DATA.warnings.join('；')}</p>`:''}
  </article>`;
}
function renderScreen(){
  screenReport.innerHTML = reportHTML(DATA.tabs.find(t=>t.key===activeKey));
}
function renderDeck(){
  exportDeck.innerHTML = DATA.tabs.map(reportHTML).join('');
}
window.addEventListener('resize', syncStickyOffsets);
document.fonts?.ready?.then(syncStickyOffsets);
syncStickyOffsets();
renderTabs();
renderScreen();
</script>
</body>
</html>
